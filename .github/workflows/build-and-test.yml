name: Module - Build & Test
on: workflow_call

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build
        run: if [ -f go.mod ]; then go build -v ./...; else echo "No go.mod, skipping"; fi
      - name: Run tests with coverage
        run: |
          if [ -f go.mod ]; then
            go list ./... | grep -v '/cmd/' | xargs go test -v -coverprofile=coverage.out
            cp coverage.out coverage_filtered.out
            COVERAGE=$(go tool cover -func=coverage_filtered.out | grep '^total:' | awk '{print $NF}' | sed 's/%//')
            echo "Filtered coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "❌ Filtered coverage is below 80%!"
              exit 1
            fi
          else
            echo "No go.mod, skipping"
          fi
