name: Aegis AI Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  automate-project:
    name: Automate Project Linking and Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Get Project Metadata (GraphQL)
        id: project_info
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # 1. Get Project ID and Issue/PR Global ID
          # For testing/manual trigger, we default to issue #20
          GH_NUMBER="${{ github.event.issue.number || github.event.pull_request.number || 20 }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            QUERY_TYPE="pullRequest"
          else
            QUERY_TYPE="issue"
          fi

          QUERY='query($org: String!, $repo: String!, $number: Int!) {
            organization(login: $org) {
              projectsV2(first: 20) {
                nodes { id number title }
              }
            }
            repository(owner: $org, name: $repo) {
              '"$QUERY_TYPE"'(number: $number) { id }
            }
          }'

          RESULT=$(gh api graphql -f org="$REPO_OWNER" -f repo="$REPO_NAME" -F number=$GH_NUMBER -f query="$QUERY")

          PROJECT_ID=$(echo "$RESULT" | jq -r '.data.organization.projectsV2.nodes[] | select(.title == "Aegis AI") | .id')
          PROJECT_NUMBER=$(echo "$RESULT" | jq -r '.data.organization.projectsV2.nodes[] | select(.title == "Aegis AI") | .number')
          CONTENT_ID=$(echo "$RESULT" | jq -r ".data.repository.${QUERY_TYPE}.id")

          if [ "$PROJECT_ID" == "null" ] || [ -z "$PROJECT_NUMBER" ] || [ "$CONTENT_ID" == "null" ]; then
            echo "Error: Could not resolve IDs. Project: $PROJECT_ID, Content: $CONTENT_ID"
            exit 1
          fi

          # 2. Add Item to Project via GraphQL
          ADD_MUTATION='mutation($project: ID!, $content: ID!) {
            addProjectV2ItemById(input: {projectId: $project, contentId: $content}) {
              item { id }
            }
          }'

          ITEM_ID=$(gh api graphql -f project="$PROJECT_ID" -f content="$CONTENT_ID" -f query="$ADD_MUTATION" -q '.data.addProjectV2ItemById.item.id')

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "project_number=$PROJECT_NUMBER" >> $GITHUB_OUTPUT
          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT

      - name: Auto-Assign Author
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue?.number || context.payload.pull_request?.number || 20;
            const actor = context.actor;
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [actor]
            });

      - name: Set Project Fields
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          ITEM_ID: ${{ steps.project_info.outputs.item_id }}
          PROJECT_ID: ${{ steps.project_info.outputs.project_id }}
          PROJECT_NUMBER: ${{ steps.project_info.outputs.project_number }}
        run: |
          # 1. Fetch Fields JSON via GraphQL
          QUERY='query($project: ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 20) {
                  nodes {
                    __typename
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options { id name }
                    }
                    ... on ProjectV2IterationField {
                      id
                      name
                      configuration {
                        iterations { id title startDate duration }
                      }
                    }
                  }
                }
              }
            }
          }'

          FIELDS_JSON=$(gh api graphql -f project="$PROJECT_ID" -f query="$QUERY")

          # Debug output to help diagnose missing exact matches
          echo "Dumping Fields JSON for debugging:"
          echo "$FIELDS_JSON" | jq .

          UPDATE_MUTATION='mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
            updateProjectV2ItemFieldValue(input: {projectId: $project, itemId: $item, fieldId: $field, value: { singleSelectOptionId: $option }}) {
              projectV2Item { id }
            }
          }'

          UPDATE_ITERATION_MUTATION='mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
            updateProjectV2ItemFieldValue(input: {projectId: $project, itemId: $item, fieldId: $field, value: { iterationId: $option }}) {
              projectV2Item { id }
            }
          }'

          # 2. Set Status based on event type
          STATUS_OPTION="Ready"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            STATUS_OPTION="In review"
          fi

          STATUS_FIELD_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Status") | .id')
          STATUS_OPTION_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Status") | .options[]? | select(.name == "'"$STATUS_OPTION"'") | .id')

          if [[ -n "$STATUS_FIELD_ID" && "$STATUS_FIELD_ID" != "null" && -n "$STATUS_OPTION_ID" && "$STATUS_OPTION_ID" != "null" ]]; then
            gh api graphql -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$STATUS_FIELD_ID" -f option="$STATUS_OPTION_ID" -f query="$UPDATE_MUTATION"
          fi

          # 3. Dynamic Component detection (Fuzzy match)
          REPO_NAME="${{ github.event.repository.name }}"
          COMPONENT="Other"
          if [[ "$REPO_NAME" == *"Agent"* ]]; then COMPONENT="Agent"; fi
          if [[ "$REPO_NAME" == *"Gateway"* ]]; then COMPONENT="Gateway"; fi
          if [[ "$REPO_NAME" == *"Brain"* ]]; then COMPONENT="Brain"; fi
          if [[ "$REPO_NAME" == *"Dashboard"* ]]; then COMPONENT="Dashboard"; fi
          if [[ "$REPO_NAME" == *"Documentation"* ]]; then COMPONENT="Documentation"; fi
          if [[ "$REPO_NAME" == *"Infra"* ]]; then COMPONENT="Infra"; fi
          if [[ "$REPO_NAME" == *"Landing"* ]]; then COMPONENT="Landing"; fi
          if [[ "$REPO_NAME" == *"Proto"* ]]; then COMPONENT="Contracts"; fi
          if [[ "$REPO_NAME" == *"Worker-Ingest"* ]]; then COMPONENT="Ingest"; fi
          if [[ "$REPO_NAME" == *"Worker-Deployer"* ]]; then COMPONENT="Deployer"; fi
          if [[ "$REPO_NAME" == *"Worker-Fixer"* ]]; then COMPONENT="Fixer"; fi
          if [[ "$REPO_NAME" == *"Worker-Pentest"* ]]; then COMPONENT="Pentest"; fi
          if [[ "$REPO_NAME" == *"Internal"* ]]; then COMPONENT="Internal"; fi

          COMP_FIELD_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Components") | .id')
          COMP_OPTION_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Components") | .options[]? | select(.name | contains("'"$COMPONENT"'")) | .id' | head -n 1)

          if [[ -n "$COMP_FIELD_ID" && "$COMP_FIELD_ID" != "null" && -n "$COMP_OPTION_ID" && "$COMP_OPTION_ID" != "null" ]]; then
            gh api graphql -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$COMP_FIELD_ID" -f option="$COMP_OPTION_ID" -f query="$UPDATE_MUTATION"
          else
            echo "Warning: Could not find component option matching $COMPONENT"
          fi

          # 4. Set Iteration to the first active iteration
          ITERATION_FIELD_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.__typename == "ProjectV2IterationField" and .name == "Iteration") | .id')
          ITERATION_OPTION_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.__typename == "ProjectV2IterationField" and .name == "Iteration") | .configuration.iterations[0].id')

          if [[ -n "$ITERATION_FIELD_ID" && "$ITERATION_FIELD_ID" != "null" && -n "$ITERATION_OPTION_ID" && "$ITERATION_OPTION_ID" != "null" ]]; then
            gh api graphql -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$ITERATION_FIELD_ID" -f option="$ITERATION_OPTION_ID" -f query="$UPDATE_ITERATION_MUTATION"
          fi

          # 5. Set Priority (Default to Medium/Normal or fallback to first option)
          PRIORITY_FIELD_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Priority") | .id')
          PRIORITY_OPTION_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Priority") | .options[]? | select(.name == "Medium" or .name == "Normal" or .name == "P2") | .id' | head -n 1)

          # If Medium/Normal is not found, just pick the second option (usually Medium in a High/Medium/Low setup)
          if [[ -z "$PRIORITY_OPTION_ID" || "$PRIORITY_OPTION_ID" == "null" ]]; then
            PRIORITY_OPTION_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[]? | select(.name == "Priority") | .options[1]?.id')
          fi

          if [[ -n "$PRIORITY_FIELD_ID" && "$PRIORITY_FIELD_ID" != "null" && -n "$PRIORITY_OPTION_ID" && "$PRIORITY_OPTION_ID" != "null" ]]; then
            gh api graphql -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$PRIORITY_FIELD_ID" -f option="$PRIORITY_OPTION_ID" -f query="$UPDATE_MUTATION"
          fi

      - name: Update Description
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # Get COMPONENT again
          REPO_NAME="${{ github.event.repository.name }}"
          COMPONENT="Other"
          if [[ "$REPO_NAME" == *"Agent"* ]]; then COMPONENT="Agent (Rust)"; fi
          if [[ "$REPO_NAME" == *"Gateway"* ]]; then COMPONENT="Gateway (Go)"; fi
          if [[ "$REPO_NAME" == *"Brain"* ]]; then COMPONENT="Brain (Python)"; fi
          if [[ "$REPO_NAME" == *"Dashboard"* ]]; then COMPONENT="Dashboard (Web)"; fi
          if [[ "$REPO_NAME" == *"Documentation"* ]]; then COMPONENT="Documentation"; fi
          if [[ "$REPO_NAME" == *"Infra"* ]]; then COMPONENT="Infra"; fi
          if [[ "$REPO_NAME" == *"Landing"* ]]; then COMPONENT="Landing Page"; fi
          if [[ "$REPO_NAME" == *"Proto"* ]]; then COMPONENT="Contracts (Proto)"; fi
          if [[ "$REPO_NAME" == *"Worker-Ingest"* ]]; then COMPONENT="Worker (Ingest)"; fi
          if [[ "$REPO_NAME" == *"Worker-Deployer"* ]]; then COMPONENT="Worker (Deployer)"; fi
          if [[ "$REPO_NAME" == *"Worker-Fixer"* ]]; then COMPONENT="Worker (Fixer)"; fi
          if [[ "$REPO_NAME" == *"Worker-Pentest"* ]]; then COMPONENT="Worker (Pentest)"; fi
          if [[ "$REPO_NAME" == *"Internal"* ]]; then COMPONENT="Internal Tools"; fi
          GH_NUMBER="${{ github.event.issue.number || github.event.pull_request.number || 20 }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TYPE="pr"
          else
            TYPE="issue"
          fi

          echo "Updating $TYPE #$GH_NUMBER"
          BODY=$(gh "$TYPE" view "$GH_NUMBER" --repo "$GITHUB_REPOSITORY" --json body -q .body)
          CLEAN_COMP=$(echo "$COMPONENT" | sed 's/[()]//g' | cut -d' ' -f1)
          NEW_BODY=$(echo "$BODY" | sed "s/\[ \] \(.*$CLEAN_COMP.*\)/\[x\] \1/g")

          if [[ "$NEW_BODY" != "$BODY" ]]; then
            gh "$TYPE" edit "$GH_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$NEW_BODY"
          fi
